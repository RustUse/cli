[package]
autobins = false
description = "RustUse command-line adoption helper."
edition = "2024"
homepage = "https://rustuse.org/cli"
keywords = ["cli", "command-line", "rustuse"]
license = "MIT OR Apache-2.0"
name = "rustuse-cli"
publish = false
repository = "https://github.com/RustUse/cli"
rust-version = "1.95.0"
# version = "0.2.0"
version = "0.2.0-beta.1"

[lib]
name = "rustuse_cli"
path = "src/lib.rs"

[[bin]]
name = "rustuse"
path = "src/bin/rustuse.rs"

[[bin]]
name = "cargo-rustuse"
path = "src/bin/cargo-rustuse.rs"

[dependencies]
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "1"
use-rust = { version = "0.2.0", path = "../use-rust/crates/use-rust" }
