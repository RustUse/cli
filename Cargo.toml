[package]
name = "rustuse-cli"
version = "0.1.0"
edition = "2024"
description = "RustUse command-line adoption helper."
license = "MIT OR Apache-2.0"

[[bin]]
name = "rustuse"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
toml = "0.8"
