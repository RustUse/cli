[graph]
all-features = true

[advisories]
unmaintained = "workspace"
unsound = "all"
yanked = "deny"

[licenses]
confidence-threshold = 0.93
unused-allowed-license = "warn"

allow = ["Apache-2.0", "MIT", "Unicode-3.0"]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
